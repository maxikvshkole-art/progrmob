name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # Берем стабильную Ubuntu, где меньше проблем с Python 3.12
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Фиксируем версию, чтобы Pygame не ругался

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake gettext libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build APK
        run: |
          yes y | buildozer -v android debug
        # Тут билд может занять минут 15, но Actions это проглотят

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: flappy-bar-apk
          path: bin/*.apk
